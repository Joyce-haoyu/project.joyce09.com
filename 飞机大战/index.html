<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞机大战 - 强化版</title>
    <style>
        /* CSS 样式部分 */
        :root {
            --primary-color: #00BFFF;
            --danger-color: #FF4500;
            --power-color: #00FF00;
            --text-color: #FFFFFF;
            --ui-bg: rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* 关键：禁止移动端默认触摸行为 */
            user-select: none; /* 禁止选中文本 */
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            color: var(--text-color);
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }

        .left-status, .right-status {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .heart-icon { color: #FF1493; margin-right: 2px; }
        .power-icon { color: var(--power-color); margin-right: 2px; }

        /* 模态框 */
        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(16, 20, 30, 0.95);
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            display: none !important;
        }

        h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 28px;
            letter-spacing: 2px;
        }

        .score-display {
            font-size: 40px;
            color: #fff;
            margin: 10px 0;
            font-weight: bold;
        }

        .btn {
            background: linear-gradient(45deg, #1E90FF, #8A2BE2);
            border: none;
            padding: 12px 24px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--primary-color); }
        .btn:active { transform: scale(0.95); }
        
        .controls-hint {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="status-bar" id="hud">
            <div class="left-status">
                <div id="scoreText">得分: 0</div>
                <div id="powerText">火力: Lv.0</div>
            </div>
            <div class="right-status" id="healthText">
                <span class="heart-icon">❤❤❤</span>
            </div>
        </div>

        <div id="startScreen" class="modal">
            <h1>飞机大战</h1>
            <p>击落敌机 · 收集道具</p>
            <div class="controls-hint">
                💻 鼠标滑动控制<br>
                📱 手指拖动控制
            </div>
            <button class="btn" id="startBtn">开始游戏</button>
        </div>

        <div id="gameOverScreen" class="modal hidden">
            <h1>游戏结束</h1>
            <p>最终得分</p>
            <div class="score-display" id="finalScore">0</div>
            <button class="btn" id="restartBtn">再次挑战</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreText = document.getElementById('scoreText');
        const powerText = document.getElementById('powerText');
        const healthText = document.getElementById('healthText');
        const finalScoreText = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        let gameState = 'MENU'; 
        let score = 0;
        let animationId;
        let frames = 0;
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // 输入控制
        const mouse = { x: width / 2, y: height / 2 };
        
        function updateInput(x, y) {
            mouse.x = x;
            mouse.y = y;
        }

        // 鼠标事件
        window.addEventListener('mousemove', (e) => {
            if (gameState === 'PLAYING') updateInput(e.clientX, e.clientY);
        });

        // 触摸事件 (支持多指，只取第一指)
        window.addEventListener('touchmove', (e) => {
            if (gameState === 'PLAYING') {
                e.preventDefault(); // 阻止滚动
                updateInput(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchstart', (e) => {
             if (gameState === 'PLAYING') {
                updateInput(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        // 类定义

        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 3 + 0.5;
                this.opacity = Math.random();
            }
            update() {
                this.y += this.speed;
                if (this.y > height) { this.y = 0; this.x = Math.random() * width; }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Player {
            constructor() {
                this.x = width / 2;
                this.y = height - 100;
                this.radius = 20;
                this.color = '#8A2BE2';
                this.health = 3;
                this.powerLevel = 0; // 0:单发, 1:双发, 2+:散射
                this.maxPowerLevel = 3;
            }

            upgradePower() {
                if (this.powerLevel < this.maxPowerLevel) {
                    this.powerLevel++;
                    updateUI();
                    // 浮动文字特效可以在这里加
                } else {
                    score += 50; // 满级加分
                }
            }

            update() {
                // 平滑移动
                this.x += (mouse.x - this.x) * 0.15;
                this.y += (mouse.y - this.y) * 0.15;

                // 边界限制
                if (this.x < this.radius) this.x = this.radius;
                if (this.x > width - this.radius) this.x = width - this.radius;
                if (this.y < this.radius) this.y = this.radius;
                if (this.y > height - this.radius) this.y = height - this.radius;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // 飞机主体
                ctx.beginPath();
                ctx.moveTo(0, -30);
                ctx.lineTo(25, 20);
                ctx.lineTo(0, 10);
                ctx.lineTo(-25, 20);
                ctx.closePath();

                let gradient = ctx.createLinearGradient(0, -30, 0, 20);
                gradient.addColorStop(0, '#00BFFF');
                gradient.addColorStop(1, '#8A2BE2');
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00BFFF';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 驾驶舱
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(3, 5);
                ctx.lineTo(-3, 5);
                ctx.fill();

                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, angle = 0, speed = 10, size = 4) {
                this.x = x;
                this.y = y;
                this.radius = size;
                this.speed = speed;
                this.angle = angle;
                this.vx = Math.sin(angle) * this.speed;
                this.vy = -Math.cos(angle) * this.speed;
                this.markedForDeletion = false;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.y < -50 || this.x < -50 || this.x > width + 50) {
                    this.markedForDeletion = true;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.fillStyle = '#E0FFFF';
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00BFFF';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Enemy {
            constructor() {
                this.radius = 20;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = Math.random() * 2 + 2 + (score / 500); 
                this.markedForDeletion = false;
                this.angle = 0;
                this.spinSpeed = Math.random() * 0.1 - 0.05;
                this.hp = 1 + Math.floor(score / 1000); // 分数越高血越厚
            }

            update() {
                this.y += this.speed;
                this.angle += this.spinSpeed;
                if (this.y > height + this.radius) this.markedForDeletion = true;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.beginPath();
                ctx.moveTo(-20, -15);
                ctx.lineTo(20, -15);
                ctx.lineTo(0, 25);
                ctx.closePath();

                ctx.fillStyle = '#FF4500';
                ctx.fill();
                ctx.strokeStyle = '#FF0000';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = 'rgba(255, 255, 0, 0.5)';
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // 新增：道具类
        class PowerUp {
            constructor() {
                this.radius = 20;
                this.x = Math.random() * (width - 40) + 20;
                this.y = -30;
                this.speed = 2; // 掉落速度较慢
                this.markedForDeletion = false;
                this.pulse = 0;
            }

            update() {
                this.y += this.speed;
                this.pulse += 0.1;
                if (this.y > height + this.radius) this.markedForDeletion = true;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 呼吸效果
                const scale = 1 + Math.sin(this.pulse) * 0.1;
                ctx.scale(scale, scale);

                // 绘制发光边框
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00FF00';
                ctx.strokeStyle = '#00FF00';
                ctx.lineWidth = 3;
                
                // 矩形框
                ctx.strokeRect(-15, -15, 30, 30);
                
                // 内部半透明填充
                ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
                ctx.fillRect(-15, -15, 30, 30);

                // 文字 P
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('P', 0, 2);

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 2;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 游戏管理器
        let player;
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        let powerUps = []; // 道具数组

        function init() {
            player = new Player();
            bullets = [];
            enemies = [];
            particles = [];
            powerUps = [];
            score = 0;
            frames = 0;
            mouse.x = width / 2;
            mouse.y = height - 150;
            updateUI();
            
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push(new Star());
            }
        }

        function createExplosion(x, y, color = '#FF4500') {
            for (let i = 0; i < 12; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnEntities() {
            // 敌人生成
            let spawnRate = 60;
            if (score > 500) spawnRate = 50;
            if (score > 1000) spawnRate = 40;
            if (score > 2000) spawnRate = 30;
            if (frames % spawnRate === 0) enemies.push(new Enemy());

            // 道具生成 (约每10秒生成一个，增加随机性)
            if (frames % 600 === 0 && Math.random() > 0.3) {
                powerUps.push(new PowerUp());
            }
        }

        function checkCollision(c1, c2) {
            const dx = c1.x - c2.x;
            const dy = c1.y - c2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < c1.radius + c2.radius;
        }

        function updateUI() {
            scoreText.innerText = `得分: ${score}`;
            powerText.innerText = `火力: Lv.${player.powerLevel}`;
            let hearts = '';
            for (let i = 0; i < player.health; i++) hearts += '❤';
            healthText.innerHTML = `<span class="heart-icon">${hearts}</span>`;
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            finalScoreText.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }

        function playerShoot() {
            // 基础射击频率，等级越高射速越快
            const fireRate = 12 - (player.powerLevel * 2); 
            if (frames % fireRate === 0) {
                
                // 0级：单发
                bullets.push(new Bullet(player.x, player.y - 30));

                // 1级：双发 (左右)
                if (player.powerLevel >= 1) {
                    bullets.push(new Bullet(player.x - 15, player.y - 15));
                    bullets.push(new Bullet(player.x + 15, player.y - 15));
                }
                
                // 2级：三发散射 (左中右)
                if (player.powerLevel >= 2) {
                     bullets.push(new Bullet(player.x, player.y - 30, -0.2, 11, 5));
                     bullets.push(new Bullet(player.x, player.y - 30, 0.2, 11, 5));
                }

                // 3级：更加密集的散弹
                if (player.powerLevel >= 3) {
                    bullets.push(new Bullet(player.x - 20, player.y - 10, -0.1, 12, 6));
                    bullets.push(new Bullet(player.x + 20, player.y - 10, 0.1, 12, 6));
                }
            }
        }

        function animate() {
            if (gameState === 'MENU' || gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(5, 5, 16, 0.3)';
                ctx.fillRect(0, 0, width, height);
                if (stars.length === 0) for (let i = 0; i < 100; i++) stars.push(new Star());
                stars.forEach(star => { star.update(); star.draw(); });
                if (gameState !== 'MENU' && gameState !== 'GAMEOVER') requestAnimationFrame(animate);
                else requestAnimationFrame(animate); 
                return;
            }

            ctx.fillStyle = 'rgba(5, 5, 16, 0.4)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => { star.update(); star.draw(); });

            player.update();
            player.draw();
            playerShoot();

            // 粒子
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.alpha <= 0) particles.splice(i, 1);
            });

            // 子弹
            bullets.forEach((b, i) => {
                b.update();
                b.draw();
                if (b.markedForDeletion) bullets.splice(i, 1);
            });

            // 敌人
            enemies.forEach((e, eIndex) => {
                e.update();
                e.draw();

                // 子弹击中敌人
                bullets.forEach((b, bIndex) => {
                    if (checkCollision(b, e)) {
                        // 简单逻辑：一击必杀，或者扣血
                        e.hp--;
                        if (e.hp <= 0) {
                            createExplosion(e.x, e.y, '#FFD700');
                            score += 10;
                            updateUI();
                            enemies.splice(eIndex, 1);
                        }
                        bullets.splice(bIndex, 1); // 子弹消失
                    }
                });

                // 敌人撞击玩家
                if (checkCollision(player, e)) {
                    createExplosion(player.x, player.y, '#FF0000');
                    enemies.splice(eIndex, 1);
                    player.health--;
                    // 被撞击掉一级火力
                    if(player.powerLevel > 0) player.powerLevel--;
                    updateUI();
                    
                    canvas.style.transform = 'translate(5px, 5px)';
                    setTimeout(() => canvas.style.transform = 'translate(0, 0)', 50);

                    if (player.health <= 0) gameOver();
                }

                if (e.markedForDeletion) enemies.splice(eIndex, 1);
            });

            // 道具逻辑
            powerUps.forEach((p, pIndex) => {
                p.update();
                p.draw();

                // 玩家吃到道具
                if (checkCollision(player, p)) {
                    player.upgradePower();
                    createExplosion(p.x, p.y, '#00FF00'); // 绿色特效
                    powerUps.splice(pIndex, 1);
                }
                
                if (p.markedForDeletion) powerUps.splice(pIndex, 1);
            });

            spawnEntities();
            frames++;
            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            init();
            gameState = 'PLAYING';
        });

        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            init();
            gameState = 'PLAYING';
        });

        init();
        animate();

    </script>
</body>
</html>
